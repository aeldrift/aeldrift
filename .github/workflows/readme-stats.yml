name: Update README sections

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Replace placeholder with token
        run: sed -i "s/TOKEN_PLACEHOLDER/${{ secrets.PAT_1 }}/g" README.md

      - name: Commit changes
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add README.md
          git commit -m "Update activity graph token" || echo "No changes"
          git push
